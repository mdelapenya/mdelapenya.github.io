# Talks and public-speaking appearances.
#
# Schema:
#   conference: <string, required>   The event name as it should be displayed.
#   date:       <YYYY-MM-DD, required>   Conference date. Use day 01 if only month is known;
#                                          use month 01 if only year is known. Used to split
#                                          Upcoming (date in the future) vs Past.
#   location:   <string, optional>   Free-form location ("Hamburg, Germany", "Madrid, ES", etc.).
#   status:     <string, optional>   Free-form status note for the whole entry. Currently unused;
#                                      the layout shows an Upcoming badge based on `date`.
#   items:      <array, required, at least 1>   List of items within this conference appearance.
#     - type:   <"talk" | "booth" | "rejected">
#       title:  <string>             For talk: the talk title.
#       description: <string>        For booth: short description of the booth activity.
#       note:   <string>             For rejected: short note. Also used on talks for free-form
#                                      annotations like "accepted for the conference".
#       url:    <link, optional>     Event/agenda page.
#       video:  <link, optional>     Video link (typically YouTube).
#       video_language: <string>     Optional language hint, e.g. "Spanish".
#       slides: <link, optional>     Slides PDF.
#       slides_language: <string>    Optional language hint.
#       podcast: <link, optional>    Podcast episode link.

